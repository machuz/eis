<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <defs>
    <linearGradient id="gc-go" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#42a5f5"/><stop offset="100%" stop-color="#1e88e5"/></linearGradient>
    <linearGradient id="gc-dyn" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ffd700"/><stop offset="100%" stop-color="#ffab00"/></linearGradient>
    <linearGradient id="gc-exp" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ab47bc"/><stop offset="100%" stop-color="#8e24aa"/></linearGradient>
    <linearGradient id="gc-fw" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ef5350"/><stop offset="100%" stop-color="#c62828"/></linearGradient>
    <linearGradient id="gc-sys" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#66bb6a"/><stop offset="100%" stop-color="#2e7d32"/></linearGradient>
  </defs>
  <rect width="800" height="340" fill="#0d1117" rx="12"/>
  <text x="400" y="38" text-anchor="middle" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="600">Gravity Concentration by Language Category</text>
  <text x="400" y="58" text-anchor="middle" fill="#8b949e" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Share of total gravity held by top 10 contributors</text>

  <!-- Grid lines -->
  <line x1="280" y1="75" x2="280" y2="310" stroke="#21262d" stroke-width="1"/>
  <line x1="410" y1="75" x2="410" y2="310" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="540" y1="75" x2="540" y2="310" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="670" y1="75" x2="670" y2="310" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="280" y="325" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="10">0%</text>
  <text x="410" y="325" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="10">5%</text>
  <text x="540" y="325" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="10">10%</text>
  <text x="670" y="325" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="10">15%</text>

  <!-- Go (Self-structured): 16.4% -->
  <text x="270" y="103" text-anchor="end" fill="#f0f6fc" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">Go (Self-structured)</text>
  <rect x="280" y="85" width="426" height="28" rx="4" fill="url(#gc-go)" opacity="0.9"/>
  <text x="714" y="104" fill="#42a5f5" font-family="-apple-system,sans-serif" font-size="14" font-weight="700">16.4%</text>

  <!-- Dynamic / Structural: 10.4% -->
  <text x="270" y="150" text-anchor="end" fill="#f0f6fc" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">Dynamic / Structural</text>
  <rect x="280" y="132" width="270" height="28" rx="4" fill="url(#gc-dyn)" opacity="0.9"/>
  <text x="558" y="151" fill="#ffd700" font-family="-apple-system,sans-serif" font-size="14" font-weight="700">10.4%</text>

  <!-- Expressive (Rust/Scala): 6.7% -->
  <text x="270" y="197" text-anchor="end" fill="#f0f6fc" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">Expressive (Rust/Scala)</text>
  <rect x="280" y="179" width="174" height="28" rx="4" fill="url(#gc-exp)" opacity="0.9"/>
  <text x="462" y="198" fill="#ab47bc" font-family="-apple-system,sans-serif" font-size="14" font-weight="700">6.7%</text>

  <!-- Framework-driven: 5.1% -->
  <text x="270" y="244" text-anchor="end" fill="#f0f6fc" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">Framework-driven</text>
  <rect x="280" y="226" width="133" height="28" rx="4" fill="url(#gc-fw)" opacity="0.9"/>
  <text x="421" y="245" fill="#ef5350" font-family="-apple-system,sans-serif" font-size="14" font-weight="700">5.1%</text>

  <!-- Systems (C/C++): 3.4% -->
  <text x="270" y="291" text-anchor="end" fill="#f0f6fc" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">Systems (C/C++)</text>
  <rect x="280" y="273" width="88" height="28" rx="4" fill="url(#gc-sys)" opacity="0.9"/>
  <text x="376" y="292" fill="#66bb6a" font-family="-apple-system,sans-serif" font-size="14" font-weight="700">3.4%</text>
</svg>