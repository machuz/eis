<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#0d1117" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="600">Three Modes of Structural Authority</text>

  <!-- Mode 1: Architect-centric -->
  <g transform="translate(133,160)">
    <!-- Large central circle -->
    <circle cx="0" cy="0" r="36" fill="#42a5f5" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" fill="#0d1117" font-family="-apple-system,sans-serif" font-size="11" font-weight="700">Architect</text>
    <!-- Small orbiting circles -->
    <circle cx="-52" cy="-30" r="10" fill="#42a5f5" opacity="0.3"/>
    <circle cx="52" cy="-30" r="10" fill="#42a5f5" opacity="0.3"/>
    <circle cx="-52" cy="30" r="10" fill="#42a5f5" opacity="0.3"/>
    <circle cx="52" cy="30" r="10" fill="#42a5f5" opacity="0.3"/>
    <circle cx="0" cy="-55" r="8" fill="#42a5f5" opacity="0.25"/>
    <circle cx="-60" cy="0" r="8" fill="#42a5f5" opacity="0.25"/>
    <circle cx="60" cy="0" r="8" fill="#42a5f5" opacity="0.25"/>
    <circle cx="0" cy="55" r="8" fill="#42a5f5" opacity="0.25"/>
    <!-- Lines -->
    <line x1="0" y1="0" x2="-52" y2="-30" stroke="#42a5f5" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="52" y2="-30" stroke="#42a5f5" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="-52" y2="30" stroke="#42a5f5" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="52" y2="30" stroke="#42a5f5" stroke-width="1" opacity="0.3"/>
  </g>
  <text x="133" y="245" text-anchor="middle" fill="#42a5f5" font-family="-apple-system,sans-serif" font-size="14" font-weight="600">Architect-centric</text>
  <text x="133" y="263" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="11">Go</text>
  <text x="133" y="280" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="11">Concentration: 16.4%</text>

  <!-- Mode 2: Type-distributed -->
  <g transform="translate(400,160)">
    <circle cx="0" cy="-35" r="18" fill="#ab47bc" opacity="0.7"/>
    <circle cx="-32" cy="-12" r="18" fill="#ab47bc" opacity="0.65"/>
    <circle cx="32" cy="-12" r="18" fill="#ab47bc" opacity="0.6"/>
    <circle cx="-20" cy="22" r="18" fill="#ab47bc" opacity="0.55"/>
    <circle cx="20" cy="22" r="18" fill="#ab47bc" opacity="0.5"/>
    <circle cx="0" cy="48" r="14" fill="#ab47bc" opacity="0.45"/>
    <circle cx="-48" cy="20" r="14" fill="#ab47bc" opacity="0.4"/>
    <circle cx="48" cy="20" r="14" fill="#ab47bc" opacity="0.4"/>
    <circle cx="-45" cy="-25" r="12" fill="#ab47bc" opacity="0.35"/>
    <circle cx="45" cy="-25" r="12" fill="#ab47bc" opacity="0.35"/>
    <!-- Type signature connections -->
    <line x1="0" y1="-35" x2="-32" y2="-12" stroke="#ab47bc" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="-35" x2="32" y2="-12" stroke="#ab47bc" stroke-width="1" opacity="0.2"/>
    <line x1="-32" y1="-12" x2="-20" y2="22" stroke="#ab47bc" stroke-width="1" opacity="0.2"/>
    <line x1="32" y1="-12" x2="20" y2="22" stroke="#ab47bc" stroke-width="1" opacity="0.2"/>
    <line x1="-20" y1="22" x2="20" y2="22" stroke="#ab47bc" stroke-width="1" opacity="0.2"/>
  </g>
  <text x="400" y="245" text-anchor="middle" fill="#ab47bc" font-family="-apple-system,sans-serif" font-size="14" font-weight="600">Type-distributed</text>
  <text x="400" y="263" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="11">Rust, Scala</text>
  <text x="400" y="280" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="11">Concentration: 6.7%</text>

  <!-- Mode 3: Framework-absorbed -->
  <g transform="translate(667,160)">
    <!-- Framework rectangle -->
    <rect x="-60" y="-50" width="120" height="100" rx="8" fill="none" stroke="#ef5350" stroke-width="2.5" opacity="0.6"/>
    <text x="0" y="-58" text-anchor="middle" fill="#ef5350" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" opacity="0.8">FRAMEWORK</text>
    <!-- People inside the framework -->
    <circle cx="-30" cy="-18" r="12" fill="#ef5350" opacity="0.4"/>
    <circle cx="10" cy="-18" r="12" fill="#ef5350" opacity="0.35"/>
    <circle cx="-15" cy="12" r="12" fill="#ef5350" opacity="0.3"/>
    <circle cx="25" cy="12" r="12" fill="#ef5350" opacity="0.3"/>
    <circle cx="-35" cy="30" r="10" fill="#ef5350" opacity="0.25"/>
    <circle cx="5" cy="35" r="10" fill="#ef5350" opacity="0.25"/>
    <circle cx="38" cy="-5" r="10" fill="#ef5350" opacity="0.25"/>
    <circle cx="-10" cy="-35" r="8" fill="#ef5350" opacity="0.2"/>
  </g>
  <text x="667" y="245" text-anchor="middle" fill="#ef5350" font-family="-apple-system,sans-serif" font-size="14" font-weight="600">Framework-absorbed</text>
  <text x="667" y="263" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="11">Rails, Spring, Laravel</text>
  <text x="667" y="280" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="11">Concentration: 5.1%</text>

  <!-- Dividers -->
  <line x1="267" y1="80" x2="267" y2="230" stroke="#21262d" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="533" y1="80" x2="533" y2="230" stroke="#21262d" stroke-width="1" stroke-dasharray="6,4"/>
</svg>