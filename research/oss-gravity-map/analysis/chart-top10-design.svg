<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <defs>
    <linearGradient id="td-go" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#42a5f5"/><stop offset="100%" stop-color="#1e88e5"/></linearGradient>
    <linearGradient id="td-exp" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ab47bc"/><stop offset="100%" stop-color="#8e24aa"/></linearGradient>
    <linearGradient id="td-sys" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#66bb6a"/><stop offset="100%" stop-color="#2e7d32"/></linearGradient>
    <linearGradient id="td-dyn" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ffd700"/><stop offset="100%" stop-color="#ffab00"/></linearGradient>
    <linearGradient id="td-fw" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ef5350"/><stop offset="100%" stop-color="#c62828"/></linearGradient>
  </defs>
  <rect width="800" height="340" fill="#0d1117" rx="12"/>
  <text x="400" y="38" text-anchor="middle" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="600">Top 10 Average Design Score by Category</text>
  <text x="400" y="58" text-anchor="middle" fill="#8b949e" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Higher = more structural authority held by top contributors</text>

  <!-- Grid -->
  <line x1="280" y1="75" x2="280" y2="310" stroke="#21262d" stroke-width="1"/>
  <line x1="392" y1="75" x2="392" y2="310" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="504" y1="75" x2="504" y2="310" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="616" y1="75" x2="616" y2="310" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="728" y1="75" x2="728" y2="310" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="280" y="325" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="10">0</text>
  <text x="392" y="325" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="10">10</text>
  <text x="504" y="325" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="10">20</text>
  <text x="616" y="325" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="10">30</text>
  <text x="728" y="325" text-anchor="middle" fill="#484f58" font-family="-apple-system,sans-serif" font-size="10">40</text>

  <!-- Go: 31.3 -->
  <text x="270" y="103" text-anchor="end" fill="#f0f6fc" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">Go (Self-structured)</text>
  <rect x="280" y="85" width="351" height="28" rx="4" fill="url(#td-go)" opacity="0.9"/>
  <text x="639" y="104" fill="#42a5f5" font-family="-apple-system,sans-serif" font-size="14" font-weight="700">31.3</text>

  <!-- Expressive: 26.3 -->
  <text x="270" y="150" text-anchor="end" fill="#f0f6fc" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">Expressive (Rust/Scala)</text>
  <rect x="280" y="132" width="295" height="28" rx="4" fill="url(#td-exp)" opacity="0.9"/>
  <text x="583" y="151" fill="#ab47bc" font-family="-apple-system,sans-serif" font-size="14" font-weight="700">26.3</text>

  <!-- Systems: 25.4 -->
  <text x="270" y="197" text-anchor="end" fill="#f0f6fc" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">Systems (C/C++)</text>
  <rect x="280" y="179" width="285" height="28" rx="4" fill="url(#td-sys)" opacity="0.9"/>
  <text x="573" y="198" fill="#66bb6a" font-family="-apple-system,sans-serif" font-size="14" font-weight="700">25.4</text>

  <!-- Dynamic: 24.8 -->
  <text x="270" y="244" text-anchor="end" fill="#f0f6fc" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">Dynamic / Structural</text>
  <rect x="280" y="226" width="278" height="28" rx="4" fill="url(#td-dyn)" opacity="0.9"/>
  <text x="566" y="245" fill="#ffd700" font-family="-apple-system,sans-serif" font-size="14" font-weight="700">24.8</text>

  <!-- Framework-driven: 23.7 -->
  <text x="270" y="291" text-anchor="end" fill="#f0f6fc" font-family="-apple-system,sans-serif" font-size="13" font-weight="500">Framework-driven</text>
  <rect x="280" y="273" width="266" height="28" rx="4" fill="url(#td-fw)" opacity="0.9"/>
  <text x="554" y="292" fill="#ef5350" font-family="-apple-system,sans-serif" font-size="14" font-weight="700">23.7</text>
</svg>