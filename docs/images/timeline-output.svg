<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; font-size: 12px; }
      .header { fill: #56b6c2; font-weight: 700; }
      .name { fill: #e5c07b; font-weight: 700; font-size: 13px; }
      .label { fill: #abb2bf; }
      .score-high { fill: #c678dd; font-weight: 700; }
      .score-mid { fill: #98c379; font-weight: 700; }
      .score-low { fill: #e5c07b; }
      .score-dim { fill: #5c6370; }
      .role { fill: #61afef; }
      .style { fill: #e06c75; }
      .state-active { fill: #98c379; }
      .state-former { fill: #e06c75; }
      .state-growing { fill: #e5c07b; }
      .domain-title { fill: #e06c75; font-weight: 700; font-size: 15px; }
      .prompt { fill: #98c379; font-size: 13px; }
      .cmd { fill: #abb2bf; font-size: 13px; }
      .transition { fill: #56b6c2; font-size: 11px; }
      .trans-arrow { fill: #e5c07b; font-size: 11px; }
      .dim { fill: #5c6370; }
      .separator { fill: #3e4451; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="1200" height="680" rx="10" fill="#282c34"/>

