<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="800" height="600" fill="#1d2021"/>
  <text x="400" y="35" text-anchor="middle" fill="#d3869b" font-size="18" font-weight="700">ideal 2コマ — 「データで組む組織」</text>

  <!-- Panel 1 -->
  <rect x="30" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="50" y="82" fill="#928374" font-size="13">① 組織改編あるある</text>

  <circle cx="200" cy="150" r="25" fill="#d79921"/>
  <text x="200" y="157" text-anchor="middle" fill="#1d2021" font-size="10">CEO</text>

  <rect x="80" y="190" width="260" height="40" rx="10" fill="#3c3836"/>
  <text x="95" y="215" fill="#ebdbb2" font-size="12">「来期、チームを再編する！」</text>

  <!-- Traditional reorg -->
  <rect x="70" y="250" width="290" height="140" rx="8" fill="#1d2021" stroke="#504945"/>
  <text x="90" y="275" fill="#928374" font-size="12">従来の組織改編の根拠:</text>
  <text x="90" y="300" fill="#ebdbb2" font-size="11">・マネージャーの勘と経験</text>
  <text x="90" y="320" fill="#ebdbb2" font-size="11">・「あの人とあの人は相性がいい」（主観）</text>
  <text x="90" y="340" fill="#ebdbb2" font-size="11">・人数バランス（5:5 で割る）</text>
  <text x="90" y="360" fill="#ebdbb2" font-size="11">・「新しい刺激を」（なんとなく）</text>
  <text x="90" y="382" fill="#fb4934" font-size="11">↑ 構造的根拠ゼロ</text>

  <!-- Result -->
  <rect x="70" y="410" width="290" height="60" rx="8" fill="#504945"/>
  <text x="85" y="435" fill="#a89984" font-size="12">結果: 3ヶ月後に「あの改編は失敗だった」</text>
  <text x="85" y="455" fill="#a89984" font-size="11">Architect が分散してどちらのチームも弱体化</text>

  <text x="210" y="500" text-anchor="middle" fill="#928374" font-size="12">組織を勘で組むと、構造が壊れる。</text>

  <!-- Panel 2 -->
  <rect x="410" y="55" width="360" height="480" rx="12" fill="#282828" stroke="#504945" stroke-width="2"/>
  <text x="430" y="82" fill="#928374" font-size="13">② ideal の TeamFormation</text>

  <rect x="440" y="100" width="310" height="140" rx="8" fill="#1d2021" stroke="#d3869b"/>
  <text x="455" y="122" fill="#d3869b" font-size="12" font-weight="600">TeamFormation — 再編シミュレーション</text>

  <text x="455" y="148" fill="#928374" font-size="11">案A: 人数均等割り</text>
  <text x="455" y="168" fill="#fb4934" font-size="11">  → Team1: Complement 28, Team2: Complement 22</text>
  <text x="455" y="185" fill="#fb4934" font-size="10">  → 両チーム Architect 不在。両方 Irregular。</text>

  <text x="455" y="210" fill="#928374" font-size="11">案B: 補完性最適化</text>
  <text x="455" y="230" fill="#8ec07c" font-size="11">  → Team1: Complement 75, Team2: Complement 68</text>
  <text x="455" y="247" fill="#8ec07c" font-size="10">  → 各チームに Architect + Anchor。両方 Spiral 候補。</text>

  <!-- Detail of Plan B -->
  <rect x="440" y="260" width="310" height="110" rx="8" fill="#3c3836"/>
  <text x="455" y="283" fill="#d3869b" font-size="12">案B の配置:</text>
  <text x="455" y="308" fill="#ebdbb2" font-size="11">Team 1: Archi(W) + Anchor(R.S.) + Prod x2</text>
  <text x="455" y="328" fill="#ebdbb2" font-size="11">Team 2: Archi(R.M.) + Anchor(X) + Prod + Grow</text>
  <text x="455" y="350" fill="#8ec07c" font-size="11">→ 各チームが自律的に構造を維持できる</text>
  <text x="455" y="365" fill="#928374" font-size="10">Conway's Law: モジュール境界とチーム境界を一致</text>

  <!-- Key insight -->
  <rect x="440" y="385" width="310" height="80" rx="8" fill="#1d2021" stroke="#d3869b"/>
  <text x="455" y="408" fill="#d3869b" font-size="13">組織改編 = チーム構造の設計。</text>
  <text x="455" y="430" fill="#ebdbb2" font-size="12">勘で組むか、重力で組むか。</text>
  <text x="455" y="455" fill="#fabd2f" font-size="12">崩壊しにくい配置は、データが知っている。</text>

  <circle cx="590" cy="510" r="20" fill="#d79921"/>
  <text x="590" y="517" text-anchor="middle" fill="#1d2021" font-size="10">CEO</text>
  <text x="625" y="510" fill="#d3869b" font-size="11">「勘じゃなくて重力で組む」</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#d3869b" font-size="14" font-weight="600">崩壊しにくい組織は、勘ではなくデータで組む。</text>
  <text x="400" y="585" text-anchor="middle" fill="#504945" font-size="11">orbitlens ideal — Navigate by gravity, not by noise.</text>
</svg>
