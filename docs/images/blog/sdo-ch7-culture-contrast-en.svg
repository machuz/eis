<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <rect width="960" height="620" rx="12" fill="#1d2021"/>
  <rect x="0" y="0" width="4" height="620" rx="2" fill="#8ec07c"/>
  <text x="936" y="24" text-anchor="end" class="mono" fill="#504945" font-size="10">Culture · ch7</text>

  <text x="480" y="46" text-anchor="middle" class="sans" fill="#ebdbb2" font-size="22" font-weight="800" letter-spacing="1.2">Without Culture vs With Culture — Does the Meeting Converge?</text>
  <text x="480" y="68" text-anchor="middle" class="sans" fill="#928374" font-size="12">The same topic ("code quality is slipping") lands differently depending on the vocabulary available</text>

  <text x="244" y="102" text-anchor="middle" class="sans" fill="#cc241d" font-size="18" font-weight="800">✕ No culture</text>
  <text x="244" y="120" text-anchor="middle" class="mono" fill="#7c6f64" font-size="11">values pinned on the wall only</text>
  <text x="716" y="102" text-anchor="middle" class="sans" fill="#b8bb26" font-size="18" font-weight="800">✓ Culture</text>
  <text x="716" y="120" text-anchor="middle" class="mono" fill="#7c6f64" font-size="11">vocabulary used day to day</text>

  <line x1="480" y1="140" x2="480" y2="540" stroke="#3c3836" stroke-width="1" stroke-dasharray="4 4"/>

  <rect x="40" y="140" width="408" height="40" rx="8" fill="#282828" stroke="#7c6f64" stroke-width="1"/>
  <text x="244" y="166" text-anchor="middle" class="sans" fill="#a89984" font-size="12">Agenda: "I feel like code quality has been slipping lately"</text>

  <rect x="512" y="140" width="408" height="40" rx="8" fill="#282828" stroke="#7c6f64" stroke-width="1"/>
  <text x="716" y="166" text-anchor="middle" class="sans" fill="#a89984" font-size="12">Agenda: "I feel like code quality has been slipping lately"</text>

  <!-- Panel A: No culture -->
  <rect x="40" y="200" width="408" height="270" rx="10" fill="#282828" stroke="#cc241d" stroke-width="1.5" stroke-dasharray="5 3"/>
  <rect x="40" y="200" width="6" height="270" rx="3" fill="#cc241d"/>
  <text x="60" y="224" class="sans" fill="#cc241d" font-size="13" font-weight="800">How the discussion unfolds</text>

  <text x="60" y="252" class="sans" fill="#ebdbb2" font-size="12">A: "Is that an Ownership problem?"</text>
  <text x="60" y="274" class="sans" fill="#ebdbb2" font-size="12">B: "More like Excellence, maybe?"</text>
  <text x="60" y="296" class="sans" fill="#ebdbb2" font-size="12">C: "Speed matters too — Ship it first?"</text>
  <text x="60" y="318" class="sans" fill="#ebdbb2" font-size="12">A: "Call it an individual's Ownership issue..."</text>
  <text x="60" y="340" class="sans" fill="#928374" font-size="11">(opinions stack up by feeling and taste)</text>

  <line x1="60" y1="368" x2="428" y2="368" stroke="#3c3836" stroke-width="1"/>

  <text x="60" y="388" class="sans" fill="#cc241d" font-size="12" font-weight="700">Outcome: scatters</text>
  <text x="60" y="408" class="sans" fill="#928374" font-size="11">Values are touched as slogans on top</text>
  <text x="60" y="424" class="sans" fill="#928374" font-size="11">of the agenda — never as decision material</text>
  <text x="60" y="446" class="sans" fill="#7c6f64" font-size="10">Next meeting: same topic, scatters the same way</text>

  <!-- Panel B: With culture -->
  <rect x="512" y="200" width="408" height="270" rx="10" fill="#282828" stroke="#b8bb26" stroke-width="1.5"/>
  <rect x="512" y="200" width="6" height="270" rx="3" fill="#b8bb26"/>
  <text x="532" y="224" class="sans" fill="#b8bb26" font-size="13" font-weight="800">How the discussion unfolds</text>

  <text x="532" y="252" class="sans" fill="#ebdbb2" font-size="12">A: "Which layer? Design?"</text>
  <text x="532" y="274" class="sans" fill="#ebdbb2" font-size="12">B: "Utility territory. Not Robust."</text>
  <text x="532" y="296" class="sans" fill="#ebdbb2" font-size="12">C: "Refactor Design first, pile this on."</text>
  <text x="532" y="318" class="sans" fill="#ebdbb2" font-size="12">A: "Breadth too wide. Name an Anchor."</text>
  <text x="532" y="340" class="sans" fill="#928374" font-size="11">(opinions interlock along structural axes)</text>

  <line x1="532" y1="368" x2="900" y2="368" stroke="#3c3836" stroke-width="1"/>

  <text x="532" y="388" class="sans" fill="#b8bb26" font-size="12" font-weight="700">Outcome: converges</text>
  <text x="532" y="408" class="sans" fill="#928374" font-size="11">Decision lands along structural axes,</text>
  <text x="532" y="424" class="sans" fill="#928374" font-size="11">next step: "who takes the Anchor?"</text>
  <text x="532" y="446" class="sans" fill="#7c6f64" font-size="10">Can be verified against progress one week later</text>

  <!-- Bottom message -->
  <rect x="40" y="500" width="880" height="50" rx="10" fill="#1d2021" stroke="#8ec07c" stroke-width="1.5"/>
  <text x="480" y="524" text-anchor="middle" class="sans" fill="#8ec07c" font-size="14" font-weight="800">Usable vocabulary = culture. The values on the wall are culture's shadow, its result</text>
  <text x="480" y="542" text-anchor="middle" class="sans" fill="#928374" font-size="11">Without vocabulary that descends into decisions, declaring values doesn't produce culture</text>

  <!-- Footer -->
  <text x="480" y="582" text-anchor="middle" class="sans" fill="#a89984" font-size="11">One-week test: if a new hire uses structural vocabulary naturally within a week, culture has taken hold</text>
  <text x="480" y="602" text-anchor="middle" class="sans" fill="#928374" font-size="10">If they can't, those "values" are just paper pinned to the wall</text>
</svg>
