<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fabd2f" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#282828" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Terminal background -->
  <rect width="1000" height="420" rx="10" fill="#282828"/>

  <!-- Title bar -->
  <rect width="1000" height="32" rx="10" fill="#1d2021"/>
  <rect y="22" width="1000" height="10" fill="#1d2021"/>
  <circle cx="20" cy="16" r="6" fill="#cc241d"/>
  <circle cx="40" cy="16" r="6" fill="#d79921"/>
  <circle cx="60" cy="16" r="6" fill="#98971a"/>
  <text x="500" y="20" text-anchor="middle" fill="#928374" font-size="12">Engineering Impact Signal — Chapter 0</text>

  <!-- Left side: Text content -->
  <text x="30" y="75" fill="#928374" font-size="12">Chapter 0 — Introduction</text>
  <text x="30" y="115" fill="#fabd2f" font-size="24" font-weight="700">The Git Telescope</text>
  <text x="30" y="150" fill="#8ec07c" font-size="16" font-weight="700">Making Architecture</text>
  <text x="30" y="172" fill="#8ec07c" font-size="16" font-weight="700">a Science</text>

  <!-- Left side: key concepts -->
  <text x="30" y="215" fill="#d3869b" font-size="11" font-weight="700">What EIS Reveals</text>
  <text y="238" font-size="11"><tspan x="30" fill="#665c54">$</tspan><tspan fill="#ebdbb2"> observer's eye </tspan><tspan fill="#928374">-&gt;</tspan><tspan fill="#fabd2f"> telescope</tspan></text>
  <text y="258" font-size="11"><tspan x="30" fill="#665c54">$</tspan><tspan fill="#ebdbb2"> gut feeling    </tspan><tspan fill="#928374">-&gt;</tspan><tspan fill="#fabd2f"> numbers</tspan></text>
  <text y="278" font-size="11"><tspan x="30" fill="#665c54">$</tspan><tspan fill="#ebdbb2"> best practices </tspan><tspan fill="#928374">-&gt;</tspan><tspan fill="#fabd2f"> quantified</tspan></text>
  <text y="298" font-size="11"><tspan x="30" fill="#665c54">$</tspan><tspan fill="#ebdbb2"> architecture   </tspan><tspan fill="#928374">-&gt;</tspan><tspan fill="#fabd2f"> science</tspan></text>

  <!-- Bottom prompt -->
  <text x="30" y="370" fill="#8ec07c" font-size="12">$ brew tap machuz/tap &amp;&amp; brew install eis</text>
  <text x="30" y="390" fill="#8ec07c" font-size="12">$ eis</text>
  <rect x="60" y="378" width="7" height="14" fill="#ebdbb2" opacity="0.7"/>

  <!-- Right side: Telescope ASCII art -->
  <g opacity="0.9">
    <!-- Glow behind telescope -->
    <circle cx="750" cy="220" r="120" fill="url(#glow)"/>

    <!-- Stars -->
    <text x="620" y="80" fill="#fabd2f" font-size="14" opacity="0.5">*</text>
    <text x="710" y="65" fill="#ebdbb2" font-size="10" opacity="0.4">.</text>
    <text x="850" y="90" fill="#d3869b" font-size="12" opacity="0.5">*</text>
    <text x="920" y="70" fill="#ebdbb2" font-size="10" opacity="0.3">.</text>
    <text x="680" y="100" fill="#8ec07c" font-size="8" opacity="0.4">.</text>
    <text x="800" y="75" fill="#ebdbb2" font-size="10" opacity="0.3">.</text>
    <text x="950" y="110" fill="#fabd2f" font-size="10" opacity="0.4">*</text>
    <text x="640" y="130" fill="#ebdbb2" font-size="8" opacity="0.3">.</text>
    <text x="900" y="130" fill="#b8bb26" font-size="10" opacity="0.4">.</text>

    <!-- Telescope body -->
    <!-- Lens (top) -->
    <rect x="720" y="120" width="60" height="8" rx="4" fill="#665c54"/>
    <rect x="725" y="115" width="50" height="5" rx="2" fill="#504945"/>

    <!-- Tube -->
    <rect x="735" y="128" width="30" height="100" rx="3" fill="#504945"/>
    <rect x="738" y="128" width="24" height="100" rx="2" fill="#3c3836"/>

    <!-- Eyepiece -->
    <rect x="730" y="228" width="40" height="12" rx="3" fill="#665c54"/>

    <!-- Tripod -->
    <line x1="750" y1="240" x2="700" y2="340" stroke="#665c54" stroke-width="3"/>
    <line x1="750" y1="240" x2="800" y2="340" stroke="#665c54" stroke-width="3"/>
    <line x1="750" y1="240" x2="750" y2="345" stroke="#665c54" stroke-width="3"/>

    <!-- Light rays entering lens -->
    <line x1="680" y1="80" x2="735" y2="124" stroke="#fabd2f" stroke-width="1" opacity="0.3"/>
    <line x1="750" y1="60" x2="750" y2="115" stroke="#fabd2f" stroke-width="1" opacity="0.3"/>
    <line x1="820" y1="80" x2="765" y2="124" stroke="#fabd2f" stroke-width="1" opacity="0.3"/>

    <!-- 7 axis labels orbiting -->
    <text x="640" y="180" fill="#b8bb26" font-size="10" opacity="0.7">Production</text>
    <text x="830" y="170" fill="#b8bb26" font-size="10" opacity="0.7">Quality</text>
    <text x="850" y="210" fill="#d3869b" font-size="10" font-weight="700" opacity="0.9">Survival</text>
    <text x="840" y="250" fill="#d3869b" font-size="10" opacity="0.7">Design</text>
    <text x="630" y="260" fill="#b8bb26" font-size="10" opacity="0.7">Breadth</text>
    <text x="630" y="220" fill="#b8bb26" font-size="10" opacity="0.7">Debt</text>
    <text x="640" y="300" fill="#fabd2f" font-size="10" opacity="0.7">Indispensable</text>
  </g>
</svg>