<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="800" height="800" fill="#282828"/>

  <!-- Title bar -->
  <rect width="800" height="36" fill="#1d2021"/>
  <rect y="26" width="800" height="10" fill="#1d2021"/>
  <circle cx="22" cy="18" r="7" fill="#cc241d"/>
  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 1</text>

  <!-- Chapter number -->
  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">01</text>

  <!-- Japanese title -->
  <text x="400" y="340" text-anchor="middle" fill="#fabd2f" font-size="26" font-weight="700">履歴だけでエンジニアの</text>
  <text x="400" y="378" text-anchor="middle" fill="#fabd2f" font-size="26" font-weight="700">「戦闘力」を定量化する</text>

  <!-- English subtitle -->
  <text x="400" y="430" text-anchor="middle" fill="#928374" font-size="16">Measuring Engineering Impact</text>

  <!-- Decorative: 7-axis bar chart -->
  <text x="120" y="510" fill="#8ec07c" font-size="12" font-weight="700">7-Axis Score</text>
  <rect x="120" y="530" width="200" height="10" rx="2" fill="#b8bb26" opacity="0.8"/>
  <rect x="120" y="548" width="170" height="10" rx="2" fill="#b8bb26" opacity="0.8"/>
  <rect x="120" y="566" width="260" height="10" rx="2" fill="#d3869b" opacity="0.8"/>
  <rect x="120" y="584" width="230" height="10" rx="2" fill="#d3869b" opacity="0.8"/>
  <rect x="120" y="602" width="160" height="10" rx="2" fill="#b8bb26" opacity="0.8"/>
  <rect x="120" y="620" width="210" height="10" rx="2" fill="#b8bb26" opacity="0.8"/>
  <rect x="120" y="638" width="120" height="10" rx="2" fill="#fabd2f" opacity="0.8"/>

  <text x="100" y="540" fill="#665c54" font-size="10" text-anchor="end">P</text>
  <text x="100" y="558" fill="#665c54" font-size="10" text-anchor="end">Q</text>
  <text x="100" y="576" fill="#665c54" font-size="10" text-anchor="end">S</text>
  <text x="100" y="594" fill="#665c54" font-size="10" text-anchor="end">D</text>
  <text x="100" y="612" fill="#665c54" font-size="10" text-anchor="end">B</text>
  <text x="100" y="630" fill="#665c54" font-size="10" text-anchor="end">Dt</text>
  <text x="100" y="648" fill="#665c54" font-size="10" text-anchor="end">I</text>

  <!-- Bottom prompt -->
  <text x="30" y="760" fill="#8ec07c" font-size="13">$ eis score --author engineer-a</text>
  <rect x="388" y="747" width="8" height="16" fill="#ebdbb2" opacity="0.7"/>
</svg>