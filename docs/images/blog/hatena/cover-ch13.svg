<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="800" fill="#282828"/>

  <rect width="800" height="36" fill="#1d2021"/>
  <rect y="26" width="800" height="10" fill="#1d2021"/>
  <circle cx="22" cy="18" r="7" fill="#cc241d"/>
  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 13 — Final</text>

  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">13</text>

  <text x="400" y="330" text-anchor="middle" fill="#fabd2f" font-size="30" font-weight="700">Cosmology of Code</text>
  <text x="400" y="380" text-anchor="middle" fill="#928374" font-size="20">コード宇宙論</text>

  <!-- Decorative: cosmic map with labeled elements -->
  <circle cx="400" cy="560" r="120" fill="none" stroke="#504945" stroke-width="1" stroke-dasharray="4" opacity="0.4"/>
  <circle cx="400" cy="560" r="70" fill="none" stroke="#504945" stroke-width="1" stroke-dasharray="4" opacity="0.3"/>

  <!-- Stars/commits scattered -->
  <circle cx="340" cy="500" r="4" fill="#fabd2f" opacity="0.8"/>
  <circle cx="420" cy="480" r="3" fill="#b8bb26" opacity="0.7"/>
  <circle cx="480" cy="520" r="5" fill="#d3869b" opacity="0.8"/>
  <circle cx="350" cy="580" r="3" fill="#83a598" opacity="0.7"/>
  <circle cx="450" cy="600" r="4" fill="#8ec07c" opacity="0.8"/>
  <circle cx="380" cy="630" r="3" fill="#fabd2f" opacity="0.6"/>
  <circle cx="300" cy="550" r="3" fill="#fb4934" opacity="0.5"/>
  <circle cx="500" cy="570" r="3" fill="#b8bb26" opacity="0.6"/>
  <circle cx="400" cy="560" r="6" fill="#ebdbb2" opacity="0.9"/>

  <!-- Labels around the cosmos -->
  <text x="200" y="475" fill="#665c54" font-size="10">Git = telescope</text>
  <text x="540" y="490" fill="#665c54" font-size="10">Commits = starlight</text>
  <text x="180" y="630" fill="#665c54" font-size="10">Dependencies = gravity</text>
  <text x="530" y="640" fill="#665c54" font-size="10">Design = structure</text>

  <text x="400" y="720" text-anchor="middle" fill="#ebdbb2" font-size="13">git archaeology is the astronomy of code universes</text>

  <text x="30" y="760" fill="#8ec07c" font-size="13">$ eis --help</text>
  <rect x="155" y="747" width="8" height="16" fill="#ebdbb2" opacity="0.7"/>
