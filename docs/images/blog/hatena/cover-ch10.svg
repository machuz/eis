<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="800" fill="#282828"/>

  <rect width="800" height="36" fill="#1d2021"/>
  <rect y="26" width="800" height="10" fill="#1d2021"/>
  <circle cx="22" cy="18" r="7" fill="#cc241d"/>
  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 10</text>

  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">10</text>

  <text x="400" y="340" text-anchor="middle" fill="#fabd2f" font-size="36" font-weight="700">Dark Matter</text>
  <text x="400" y="390" text-anchor="middle" fill="#928374" font-size="18">見えない重力</text>

  <!-- Decorative: invisible gravitational influence -->
  <!-- Visible nodes -->
  <circle cx="300" cy="540" r="8" fill="#8ec07c" opacity="0.9"/>
  <circle cx="500" cy="540" r="8" fill="#83a598" opacity="0.9"/>
  <circle cx="400" cy="630" r="8" fill="#b8bb26" opacity="0.9"/>

  <!-- Dark matter area (dashed, barely visible) -->
  <circle cx="400" cy="570" r="60" fill="none" stroke="#504945" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="400" y="575" text-anchor="middle" fill="#504945" font-size="10">?</text>

  <!-- Gravitational pull lines (curved, subtle) -->
  <path d="M 308,540 Q 350,550 392,570" fill="none" stroke="#665c54" stroke-width="1" stroke-dasharray="3"/>
  <path d="M 492,540 Q 450,550 408,570" fill="none" stroke="#665c54" stroke-width="1" stroke-dasharray="3"/>
  <path d="M 400,622 Q 400,600 400,578" fill="none" stroke="#665c54" stroke-width="1" stroke-dasharray="3"/>

  <!-- Labels -->
  <text x="300" y="520" text-anchor="middle" fill="#8ec07c" font-size="10">Reviews</text>
  <text x="500" y="520" text-anchor="middle" fill="#83a598" font-size="10">Mentoring</text>
  <text x="400" y="660" text-anchor="middle" fill="#b8bb26" font-size="10">Architecture</text>

  <text x="400" y="720" text-anchor="middle" fill="#665c54" font-size="12">Invisible contributions that shape codebases</text>

  <text x="30" y="760" fill="#8ec07c" font-size="13">$ # what git log cannot see</text>
  <rect x="320" y="747" width="8" height="16" fill="#ebdbb2" opacity="0.7"/>
</svg>