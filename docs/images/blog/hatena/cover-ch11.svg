  <rect x="650" y="560" width="20" height="20" rx="2" fill="#83a598" opacity="0.5" transform="rotate(20,660,570)"/>

  <text x="400" y="660" text-anchor="middle" fill="#665c54" font-size="12">Without maintenance, code decays into disorder</text>

  <text x="30" y="760" fill="#8ec07c" font-size="13">$ # S = k * log(W) -- Boltzmann</text>
  <rect x="375" y="747" width="8" height="16" fill="#ebdbb2" opacity="0.7"/>
