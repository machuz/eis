  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 11</text>

  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">11</text>

  <text x="400" y="340" text-anchor="middle" fill="#fabd2f" font-size="36" font-weight="700">Entropy</text>
  <text x="400" y="390" text-anchor="middle" fill="#928374" font-size="16">宇宙は常に無秩序に向かう</text>

  <!-- Decorative: ordered to disordered transition -->
  <!-- Ordered side -->
  <text x="200" y="480" text-anchor="middle" fill="#8ec07c" font-size="11" font-weight="700">Low Entropy</text>
  <rect x="150" y="500" width="20" height="20" rx="2" fill="#b8bb26" opacity="0.7"/>
  <rect x="175" y="500" width="20" height="20" rx="2" fill="#b8bb26" opacity="0.7"/>
  <rect x="200" y="500" width="20" height="20" rx="2" fill="#b8bb26" opacity="0.7"/>
  <rect x="150" y="525" width="20" height="20" rx="2" fill="#b8bb26" opacity="0.7"/>
  <rect x="175" y="525" width="20" height="20" rx="2" fill="#b8bb26" opacity="0.7"/>
  <rect x="200" y="525" width="20" height="20" rx="2" fill="#b8bb26" opacity="0.7"/>
  <rect x="150" y="550" width="20" height="20" rx="2" fill="#b8bb26" opacity="0.7"/>
  <rect x="175" y="550" width="20" height="20" rx="2" fill="#b8bb26" opacity="0.7"/>
  <rect x="200" y="550" width="20" height="20" rx="2" fill="#b8bb26" opacity="0.7"/>

  <!-- Arrow -->
  <line x1="300" y1="535" x2="490" y2="535" stroke="#665c54" stroke-width="2"/>
  <polygon points="490,530 500,535 490,540" fill="#665c54"/>
  <text x="400" y="520" text-anchor="middle" fill="#fb4934" font-size="10">time</text>

  <!-- Disordered side -->
  <text x="600" y="480" text-anchor="middle" fill="#fb4934" font-size="11" font-weight="700">High Entropy</text>
  <rect x="540" y="496" width="20" height="20" rx="2" fill="#fb4934" opacity="0.5" transform="rotate(15,550,506)"/>
  <rect x="580" y="510" width="20" height="20" rx="2" fill="#fabd2f" opacity="0.5" transform="rotate(-8,590,520)"/>
  <rect x="620" y="495" width="20" height="20" rx="2" fill="#d3869b" opacity="0.5" transform="rotate(25,630,505)"/>
  <rect x="550" y="535" width="20" height="20" rx="2" fill="#83a598" opacity="0.5" transform="rotate(-20,560,545)"/>
  <rect x="600" y="545" width="20" height="20" rx="2" fill="#fb4934" opacity="0.5" transform="rotate(10,610,555)"/>
  <rect x="640" y="530" width="20" height="20" rx="2" fill="#fabd2f" opacity="0.5" transform="rotate(-30,650,540)"/>
