  <text x="400" y="710" text-anchor="middle" fill="#665c54" font-size="12">git init -- the first commit</text>

  <text x="30" y="760" fill="#8ec07c" font-size="13">$ git log --reverse --format="%H" | head -1</text>
  <rect x="463" y="747" width="8" height="16" fill="#ebdbb2" opacity="0.7"/>
