<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="800" fill="#282828"/>

  <rect width="800" height="36" fill="#1d2021"/>
  <rect y="26" width="800" height="10" fill="#1d2021"/>
  <circle cx="22" cy="18" r="7" fill="#cc241d"/>
  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 9</text>

  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">09</text>

  <text x="400" y="340" text-anchor="middle" fill="#fabd2f" font-size="36" font-weight="700">Origin</text>
  <text x="400" y="390" text-anchor="middle" fill="#928374" font-size="18">コード宇宙のビッグバン</text>

  <!-- Decorative: Big Bang explosion from center -->
  <circle cx="400" cy="560" r="8" fill="#fabd2f"/>
  <circle cx="400" cy="560" r="25" fill="none" stroke="#fabd2f" stroke-width="1" opacity="0.7"/>
  <circle cx="400" cy="560" r="50" fill="none" stroke="#d79921" stroke-width="1" opacity="0.5"/>
  <circle cx="400" cy="560" r="80" fill="none" stroke="#d79921" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="560" r="115" fill="none" stroke="#928374" stroke-width="1" opacity="0.2"/>

