  <circle cx="350" cy="510" r="3" fill="#b8bb26" opacity="0.8"/>
  <circle cx="450" cy="520" r="2" fill="#83a598" opacity="0.7"/>
  <circle cx="380" cy="600" r="3" fill="#d3869b" opacity="0.8"/>
  <circle cx="440" cy="590" r="2" fill="#8ec07c" opacity="0.7"/>
  <circle cx="330" cy="570" r="2" fill="#fabd2f" opacity="0.6"/>
  <circle cx="470" cy="550" r="3" fill="#fb4934" opacity="0.5"/>
