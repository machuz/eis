  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 7</text>

