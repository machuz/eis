  <line x1="400" y1="502" x2="468" y2="560" stroke="#665c54" stroke-width="1" opacity="0.4"/>
  <line x1="468" y1="580" x2="412" y2="640" stroke="#665c54" stroke-width="1" opacity="0.4"/>
