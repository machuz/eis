<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="800" fill="#282828"/>

  <rect width="800" height="36" fill="#1d2021"/>
  <rect y="26" width="800" height="10" fill="#1d2021"/>
  <circle cx="22" cy="18" r="7" fill="#cc241d"/>
  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 6</text>

  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">06</text>

  <text x="400" y="340" text-anchor="middle" fill="#fabd2f" font-size="30" font-weight="700">チームは進化する</text>

  <text x="400" y="400" text-anchor="middle" fill="#928374" font-size="16">Teams Evolve</text>

  <!-- Decorative: evolution stages -->
  <rect x="100" y="490" width="120" height="60" rx="6" fill="none" stroke="#fb4934" stroke-width="1.5" opacity="0.7"/>
  <text x="160" y="520" text-anchor="middle" fill="#fb4934" font-size="10">Formation</text>
  <text x="160" y="535" text-anchor="middle" fill="#665c54" font-size="9">1-2 members</text>

  <line x1="220" y1="520" x2="260" y2="520" stroke="#665c54" stroke-width="1" stroke-dasharray="4"/>

  <rect x="260" y="490" width="120" height="60" rx="6" fill="none" stroke="#fabd2f" stroke-width="1.5" opacity="0.7"/>
  <text x="320" y="520" text-anchor="middle" fill="#fabd2f" font-size="10">Growth</text>
  <text x="320" y="535" text-anchor="middle" fill="#665c54" font-size="9">3-5 members</text>

  <line x1="380" y1="520" x2="420" y2="520" stroke="#665c54" stroke-width="1" stroke-dasharray="4"/>

  <rect x="420" y="490" width="120" height="60" rx="6" fill="none" stroke="#b8bb26" stroke-width="1.5" opacity="0.7"/>
  <text x="480" y="520" text-anchor="middle" fill="#b8bb26" font-size="10">Maturity</text>
  <text x="480" y="535" text-anchor="middle" fill="#665c54" font-size="9">6-8 members</text>

  <line x1="540" y1="520" x2="580" y2="520" stroke="#665c54" stroke-width="1" stroke-dasharray="4"/>

  <rect x="580" y="490" width="120" height="60" rx="6" fill="none" stroke="#8ec07c" stroke-width="1.5" opacity="0.7"/>
