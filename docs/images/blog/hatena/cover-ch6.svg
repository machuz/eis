  <text x="640" y="535" text-anchor="middle" fill="#665c54" font-size="9">9+ members</text>

  <!-- Health indicator -->
  <text x="400" y="620" text-anchor="middle" fill="#8ec07c" font-size="12" font-weight="700">Team Health Signal</text>
  <rect x="200" y="640" width="400" height="8" rx="4" fill="#3c3836"/>
  <rect x="200" y="640" width="300" height="8" rx="4" fill="#b8bb26"/>
