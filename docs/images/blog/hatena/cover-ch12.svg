<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="800" height="800" rx="10" fill="#282828"/>

  <rect width="800" height="36" rx="10" fill="#1d2021"/>
  <rect y="26" width="800" height="10" fill="#1d2021"/>
  <circle cx="22" cy="18" r="7" fill="#cc241d"/>
  <circle cx="44" cy="18" r="7" fill="#d79921"/>
  <circle cx="66" cy="18" r="7" fill="#98971a"/>
  <text x="400" y="23" text-anchor="middle" fill="#928374" font-size="13">git考古学 — Chapter 12</text>

  <text x="400" y="200" text-anchor="middle" fill="#3c3836" font-size="200" font-weight="700">12</text>

  <text x="400" y="340" text-anchor="middle" fill="#fabd2f" font-size="36" font-weight="700">Collapse</text>
  <text x="400" y="390" text-anchor="middle" fill="#928374" font-size="14">良いArchitectとBlack Hole Engineer</text>

  <!-- Decorative: Good architect vs Black hole -->
  <!-- Good architect (left) -->
  <text x="220" y="470" text-anchor="middle" fill="#8ec07c" font-size="12" font-weight="700">Good Architect</text>
  <circle cx="220" cy="560" r="30" fill="none" stroke="#8ec07c" stroke-width="2" opacity="0.6"/>
  <circle cx="220" cy="560" r="8" fill="#8ec07c" opacity="0.8"/>
  <!-- Radiating outward -->
  <line x1="220" y1="528" x2="220" y2="500" stroke="#8ec07c" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="560" x2="278" y2="560" stroke="#8ec07c" stroke-width="1" opacity="0.5"/>
  <line x1="190" y1="560" x2="162" y2="560" stroke="#8ec07c" stroke-width="1" opacity="0.5"/>
  <line x1="220" y1="592" x2="220" y2="620" stroke="#8ec07c" stroke-width="1" opacity="0.5"/>
  <circle cx="220" cy="495" r="4" fill="#b8bb26" opacity="0.6"/>
  <circle cx="283" cy="560" r="4" fill="#b8bb26" opacity="0.6"/>
  <circle cx="157" cy="560" r="4" fill="#b8bb26" opacity="0.6"/>
  <circle cx="220" cy="625" r="4" fill="#b8bb26" opacity="0.6"/>

  <!-- VS -->
  <text x="400" y="565" text-anchor="middle" fill="#665c54" font-size="14">vs</text>

  <!-- Black hole (right) -->
  <text x="580" y="470" text-anchor="middle" fill="#fb4934" font-size="12" font-weight="700">Black Hole</text>
  <circle cx="580" cy="560" r="30" fill="#1d2021" stroke="#fb4934" stroke-width="2"/>
  <circle cx="580" cy="560" r="12" fill="#fb4934" opacity="0.3"/>
  <!-- Pulling inward (spiral) -->
  <path d="M 530,510 Q 550,530 570,545" fill="none" stroke="#fb4934" stroke-width="1" opacity="0.5"/>
  <path d="M 630,510 Q 610,530 590,545" fill="none" stroke="#fb4934" stroke-width="1" opacity="0.5"/>
  <path d="M 530,610 Q 550,590 570,575" fill="none" stroke="#fb4934" stroke-width="1" opacity="0.5"/>
  <path d="M 630,610 Q 610,590 590,575" fill="none" stroke="#fb4934" stroke-width="1" opacity="0.5"/>
  <circle cx="525" cy="505" r="4" fill="#fb4934" opacity="0.4"/>
  <circle cx="635" cy="505" r="4" fill="#fb4934" opacity="0.4"/>
  <circle cx="525" cy="615" r="4" fill="#fb4934" opacity="0.4"/>
  <circle cx="635" cy="615" r="4" fill="#fb4934" opacity="0.4"/>

  <text x="400" y="700" text-anchor="middle" fill="#665c54" font-size="12">Gravity that nurtures vs gravity that consumes</text>

  <text x="30" y="760" fill="#8ec07c" font-size="13">$ eis team --detect-blackhole</text>
  <rect x="370" y="747" width="8" height="16" fill="#ebdbb2" opacity="0.7"/>
</svg>