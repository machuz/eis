  <text y="82" font-size="12"><tspan x="24" fill="#ebdbb2">  Indispensable </tspan><tspan x="148" fill="#fb4934">████████████████████</tspan><tspan x="292" fill="#fb4934" font-weight="700">  100</tspan><tspan x="340" fill="#fb4934">  ⚠ Danger signal</tspan></text>
