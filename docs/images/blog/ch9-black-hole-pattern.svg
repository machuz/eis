  <text y="28" font-size="12"><tspan x="24" fill="#ebdbb2">  Production    </tspan><tspan x="148" fill="#b8bb26">████████████████████</tspan><tspan x="292" fill="#b8bb26" font-weight="700">  100</tspan><tspan x="340" fill="#928374">  — High output</tspan></text>
