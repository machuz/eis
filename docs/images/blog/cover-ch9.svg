  <text y="232" font-size="12"><tspan x="20" fill="#b8bb26">  ★ </tspan><tspan x="48.8" fill="#ebdbb2">Good Architect  </tspan><tspan x="163.2" fill="#928374">— Distributes gravity, structure survives</tspan></text>
