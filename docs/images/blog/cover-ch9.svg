  <text y="298" font-size="12"><tspan x="20" fill="#d3869b">  Departure:</tspan><tspan x="120" fill="#b8bb26">  Structure remains</tspan><tspan x="300" fill="#928374">  vs  </tspan><tspan x="340" fill="#fb4934">Void</tspan></text>
