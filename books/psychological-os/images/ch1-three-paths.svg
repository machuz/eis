<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 754" role="img" aria-label="距離を作る三経路 — 問い・時間差・他者反射">
  <defs>
    <radialGradient id="selfGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2a1f18"/>
      <stop offset="72%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </radialGradient>
    <linearGradient id="selfBorder" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#c97a5f" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#5a3628" stop-opacity="0.85"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#a88848"/>
    </marker>
  </defs>

  <style>
    .title     { font: 700 30px 'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif; fill:#ebd9b6; letter-spacing:0.5px }
    .subtitle  { font: 400 15px 'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif; fill:#8a8579 }
    .box-title { font: 700 18px 'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif; fill:#e0c080 }
    .box-desc  { font: 400 13px 'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif; fill:#b8a884 }
    .self-main { font: 700 19px 'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif; fill:#ebd9b6 }
    .self-sub  { font: 400 12px 'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif; fill:#8a8579 }
    .footer    { font: italic 400 13px 'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif; fill:#6a635a }
  </style>

  <rect width="1200" height="754" fill="#1a1510"/>

  <text class="title"    x="600" y="62"  text-anchor="middle">距離を作る 三経路</text>
  <text class="subtitle" x="600" y="95"  text-anchor="middle">観測主体 = 観測対象。距離は意識的に作るしかない。</text>

  <!-- Self circle (center) -->
  <circle cx="600" cy="388" r="92" fill="url(#selfGrad)" stroke="url(#selfBorder)" stroke-width="1.6"/>
  <circle cx="600" cy="388" r="66" fill="none" stroke="#3a2620" stroke-width="0.7" stroke-dasharray="3 3"/>
  <text class="self-main" x="600" y="383" text-anchor="middle">自己</text>
  <text class="self-sub"  x="600" y="404" text-anchor="middle">観測主体</text>
  <text class="self-sub"  x="600" y="421" text-anchor="middle">= 観測対象</text>

  <!-- Arrows -->
  <line x1="600" y1="295" x2="600" y2="202" stroke="#a88848" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="535" y1="452" x2="330" y2="585" stroke="#a88848" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="665" y1="452" x2="870" y2="585" stroke="#a88848" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Box: Inquiry (top) -->
  <g transform="translate(440 138)">
    <rect width="320" height="68" rx="6" fill="#241a13" stroke="#5a4a38" stroke-width="1.1"/>
    <text class="box-title" x="160" y="30" text-anchor="middle">問い</text>
    <text class="box-desc"  x="160" y="54" text-anchor="middle">鋭い問いを自分に向ける</text>
  </g>

  <!-- Box: Time-shift (bottom-left) -->
  <g transform="translate(60 590)">
    <rect width="380" height="86" rx="6" fill="#241a13" stroke="#5a4a38" stroke-width="1.1"/>
    <text class="box-title" x="190" y="30" text-anchor="middle">時間差</text>
    <text class="box-desc"  x="190" y="54" text-anchor="middle">過去の自分と対比する</text>
    <text class="box-desc"  x="190" y="72" text-anchor="middle">(日誌・コミットログ・メモ)</text>
  </g>

  <!-- Box: Reflection (bottom-right) -->
  <g transform="translate(760 590)">
    <rect width="380" height="86" rx="6" fill="#241a13" stroke="#5a4a38" stroke-width="1.1"/>
    <text class="box-title" x="190" y="30" text-anchor="middle">他者反射</text>
    <text class="box-desc"  x="190" y="54" text-anchor="middle">他者の反応を鏡にする</text>
    <text class="box-desc"  x="190" y="72" text-anchor="middle">(相手の心理OSが健全であること)</text>
  </g>

  <text class="footer" x="600" y="735" text-anchor="middle">どの経路も、一瞬の分離を作る —— そのときだけ、観測が成立する。</text>
</svg>
